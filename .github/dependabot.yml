# Dependabot version-update config.
#
# Scope note: this file configures scheduled VERSION updates only. Security
# updates are enabled separately at the repo level and run regardless of the
# schedule below; the `groups` blocks here also apply to grouped security PRs.
#
# Limitation to remember: Dependabot cannot fix a *transitive* vulnerability by
# itself (e.g. hono via @modelcontextprotocol/sdk, protobufjs via
# onnxruntime-web). Those still need an npm `overrides` entry added by hand.
#
# Tamed 2026-07-01: major bumps are ignored (the first run opened a batch of
# breaking majors, each of which needs manual review anyway), and the eval /
# benchmark npm dirs plus the pip integration are dropped as low-value churn.
# What remains is quiet, grouped minor+patch on the two shipping packages plus
# grouped GitHub Actions. Security updates are unaffected by any of this.

version: 2

updates:
  # ---- npm: root package (the MCP server) ----
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      npm-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---- npm: multi-vault router ----
  - package-ecosystem: npm
    directory: "/packages/router"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      npm-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---- GitHub Actions used by the workflows ----
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
    groups:
      actions:
        patterns: ["*"]
