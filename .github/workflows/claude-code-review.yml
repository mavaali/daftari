# Automatic code review on every non-draft PR.
#
# Runs Claude Code against the diff and posts findings as PR comments, so
# human review starts from a machine pass and concentrates on judgment
# calls. Billed to the Claude subscription via the CLAUDE_CODE_OAUTH_TOKEN
# repo secret (generate with `claude setup-token`; valid ~1 year).

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for correctness bugs first, then for
            simplification and efficiency. Read CLAUDE.md before judging:
            this repo has hard invariants (frontmatter as the only metadata
            layer, derived/ephemeral SQLite index, git as the version layer,
            advisory-only curation, existence-disclosure rules for tension/
            edge visibility, Result<T, Error> instead of throws, no classes)
            — flag any diff that violates one. Every tool needs a test file
            mirroring src/. Only report findings you are confident in; post
            them as inline comments on the relevant lines, and finish with a
            short summary comment.
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
