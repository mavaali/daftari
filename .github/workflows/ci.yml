name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  # Tier 1 regression gate: hermetic golden-baseline suites (staleness +
  # retrieval). Also runs inside `npm test` above; this named job is the
  # required PR check with an isolated, readable signal.
  # docs/superpowers/specs/2026-07-07-regression-suite-design.md
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run test/regression

  # End-to-end gate: spawns the built dist/cli.js as a real subprocess and
  # drives it over MCP stdio — handshake, tool catalog, read/write with git
  # auto-commit, search, RBAC. Also runs inside `npm test` above; this named
  # job is the required PR check that proves the shipped artifact boots.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx vitest run test/e2e
